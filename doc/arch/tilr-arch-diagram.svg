<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: white; stroke: #333; stroke-width: 2; }
      .section-box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .display-box { fill: white; stroke: #333; stroke-width: 1.5; }
      .space-box { fill: #fafafa; stroke: #999; stroke-width: 1; }
      .app-box { fill: white; stroke: #ccc; stroke-width: 1; }
      .text-title { font-size: 14px; font-weight: bold; fill: #333; }
      .text-label { font-size: 12px; fill: #333; }
      .text-small { font-size: 10px; fill: #666; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; }
      .arrow-label { font-size: 11px; fill: #666; }
    </style>
  </defs>

  <!-- Tilr App (top left) -->
  <rect x="30" y="20" width="280" height="120" class="box"/>
  <text x="45" y="42" class="text-title">Tilr App</text>
  <text x="45" y="58" class="text-small">(AppKit/SwiftUI)</text>
  <text x="45" y="78" class="text-label">• HotKeyManager</text>
  <text x="45" y="95" class="text-label">• MenuBar</text>
  <text x="45" y="112" class="text-label">• About/Status UI</text>

  <!-- Tilr CLI (top right) -->
  <rect x="420" y="20" width="280" height="120" class="box"/>
  <text x="435" y="42" class="text-title">Tilr CLI</text>
  <text x="435" y="58" class="text-small">(Command line)</text>
  <text x="435" y="78" class="text-label">• space switch</text>
  <text x="435" y="95" class="text-label">• app move</text>
  <text x="435" y="112" class="text-label">• app hide/show</text>

  <!-- IPC connection (CLI to App) -->
  <line x1="310" y1="75" x2="420" y2="75" class="arrow" stroke="black" stroke-width="2"/>
  <polygon points="310,75 315,72 315,78" fill="black"/>
  <text x="330" y="65" class="arrow-label">IPC (socket)</text>

  <!-- AX/AppKit calls arrow -->
  <line x1="170" y1="140" x2="170" y2="190" class="arrow" stroke="black" stroke-width="2"/>
  <polygon points="170,190 167,185 173,185" fill="black"/>
  <text x="100" y="170" class="arrow-label">AX/AppKit calls</text>
  <text x="30" y="185" class="text-small">• NSRunningApplication.hide/unhide()</text>
  <text x="30" y="198" class="text-small">• setWindowFrame() via AX</text>
  <text x="30" y="211" class="text-small">• workspace notifications</text>

  <!-- macOS Window Server (accessed via Accessibility API) -->
  <rect x="20" y="200" width="960" height="450" class="section-box"/>
  <text x="40" y="225" class="text-title">macOS Window Server (via Accessibility API)</text>

  <!-- Display 1 -->
  <rect x="45" y="250" width="280" height="380" class="display-box"/>
  <text x="60" y="272" class="text-title">Display 1</text>

  <!-- Display 1 - Space 1 -->
  <rect x="65" y="290" width="240" height="95" class="space-box"/>
  <text x="75" y="307" class="text-label">Space 1</text>
  <rect x="75" y="315" width="80" height="60" class="app-box"/>
  <text x="85" y="333" class="text-label">App A</text>
  <text x="85" y="350" class="text-label">App B</text>

  <!-- Display 1 - Space 2 -->
  <rect x="65" y="395" width="240" height="60" class="space-box"/>
  <text x="75" y="412" class="text-label">Space 2</text>
  <rect x="75" y="422" width="80" height="25" class="app-box"/>
  <text x="85" y="438" class="text-label">App C</text>

  <!-- Display 2 -->
  <rect x="360" y="250" width="280" height="380" class="display-box"/>
  <text x="375" y="272" class="text-title">Display 2</text>

  <!-- Display 2 - Space 4 -->
  <rect x="380" y="290" width="240" height="95" class="space-box"/>
  <text x="390" y="307" class="text-label">Space 4</text>
  <rect x="390" y="315" width="80" height="60" class="app-box"/>
  <text x="400" y="333" class="text-label">App X</text>

  <!-- Display 2 - Space 5 -->
  <rect x="380" y="395" width="240" height="60" class="space-box"/>
  <text x="390" y="412" class="text-label">Space 5</text>

  <!-- Display N -->
  <rect x="675" y="250" width="280" height="380" class="display-box"/>
  <text x="690" y="272" class="text-title">Display N</text>
  <text x="720" y="330" class="text-label">...</text>

  <!-- Query/Notification arrows -->
  <line x1="500" y1="660" x2="500" y2="730" class="arrow" stroke="black" stroke-width="2"/>
  <polygon points="500,660 497,665 503,665" fill="black"/>
  <polygon points="500,730 497,725 503,725" fill="black"/>
  <text x="440" y="700" class="arrow-label">Queries (AX enumeration)</text>
  <text x="430" y="720" class="arrow-label">Notifications (workspace events)</text>

  <!-- Accessibility API -->
  <rect x="320" y="740" width="360" height="80" class="box"/>
  <text x="340" y="760" class="text-title">Accessibility API</text>
  <text x="340" y="780" class="text-label">AXUIElement • NSRunningApplication</text>
  <text x="340" y="798" class="text-label">NSWorkspace • ProcessSerialization</text>
</svg>
