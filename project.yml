name: Tilr
options:
  bundleIdPrefix: io.ubiqtek
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: io.ubiqtek.tilr
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MX95X5U6HA
    MARKETING_VERSION: "0.0.1"
    TILR_VERSION_SUFFIX: ""
    TILR_BUILD_DATE: ""

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"

targets:
  TilrApp:
    type: application
    platform: macOS
    sources:
      - Sources/Tilr
      - Sources/Shared
    info:
      path: Sources/Tilr/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleName: Tilr
        CFBundleDisplayName: Tilr
        CFBundleIdentifier: io.ubiqtek.tilr
        CFBundleVersion: "1"
        CFBundleShortVersionString: "$(MARKETING_VERSION)$(TILR_VERSION_SUFFIX)"
        TILRBuildDate: "$(TILR_BUILD_DATE)"
        NSHighResolutionCapable: true
        CFBundleIconFile: AppIcon
    dependencies:
      - package: HotKey
      - package: Yams
    entitlements:
      path: Sources/Tilr/Tilr.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_NAME: Tilr
    preBuildScripts:
      - name: Stamp Version
        script: |
          "$SRCROOT/scripts/stamp-version.sh"
        basedOnDependencyAnalysis: false
    configFiles:
      Debug: build/Generated/Version.xcconfig
      Release: build/Generated/Version.xcconfig

  TilrCLI:
    type: tool
    platform: macOS
    sources:
      - Sources/TilrCLI
      - Sources/Shared
    info:
      path: Sources/TilrCLI/Info.plist
      properties:
        CFBundleIdentifier: io.ubiqtek.tilr-cli
        CFBundleName: tilr
        CFBundleVersion: "1"
        CFBundleShortVersionString: "$(MARKETING_VERSION)$(TILR_VERSION_SUFFIX)"
        TILRBuildDate: "$(TILR_BUILD_DATE)"
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
      - package: Yams
    settings:
      base:
        PRODUCT_NAME: tilr
        PRODUCT_BUNDLE_IDENTIFIER: io.ubiqtek.tilr-cli
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
    preBuildScripts:
      - name: Stamp Version
        script: |
          "$SRCROOT/scripts/stamp-version.sh"
        basedOnDependencyAnalysis: false
    configFiles:
      Debug: build/Generated/Version.xcconfig
      Release: build/Generated/Version.xcconfig

  TilrCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/TilrCoreTests
      - Sources/Shared
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.ubiqtek.tilr-core-tests
        GENERATE_INFOPLIST_FILE: YES
